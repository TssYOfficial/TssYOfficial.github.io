<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discord Info | TssY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .discord-card {
      max-width: 600px;
      margin: 150px auto;
      padding: 60px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      text-align: center;
      position: relative;
    }
    .discord-card::before {
      content: 'COMMUNICATION';
      position: absolute;
      top: 20px;
      left: 20px;
      font-family: var(--font-display);
      font-size: 0.7rem;
      letter-spacing: 5px;
      color: var(--accent-color);
      opacity: 0.5;
    }
    .discord-tag {
      font-family: var(--font-japanese);
      font-size: 2.5rem;
      color: var(--accent-color);
      margin: 30px 0;
      letter-spacing: 2px;
      word-break: break-all;
    }
    .extra-info {
      font-family: var(--font-body);
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 40px;
    }
    .status-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      background: #43b581;
      border-radius: 50%;
      margin-right: 10px;
      box-shadow: 0 0 10px #43b581;
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="background-moon"></div>

  <a href="index.html" class="menu-btn" style="text-decoration: none; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">←</a>

  <div class="discord-card reveal visible">
    <h2><span class="brush-accent">Discord</span></h2>
    <div class="discord-tag">Thijssssie_official</div>
    <div class="extra-info">
      <p><span class="status-dot"></span> Available for new projects and commissions.</p>
      <p>Average response time: &lt; 2 hours</p>
      <p>Specializing in Discord Bot architecture and Minecraft server systems.</p>
    </div>
    <div class="buttons">
      <button class="btn primary" onclick="copyDiscord()">Copy Username</button>
      <a href="index.html" class="btn outline">Back Home</a>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    function copyDiscord() {
      navigator.clipboard.writeText('Thijssssie_official');
      const btn = document.querySelector('.btn.primary');
      const originalText = btn.innerText;
      btn.innerText = 'COPIED!';
      setTimeout(() => btn.innerText = originalText, 2000);
    }
  </script>
</body>
</html>
